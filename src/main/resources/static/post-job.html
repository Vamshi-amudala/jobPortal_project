<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post a Job</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 50px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    h2 {
      text-align: center;
      color: #4f46e5;
      margin-bottom: 30px;
    }
    label {
      font-weight: 600;
      margin-top: 15px;
      display: block;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      font-size: 1rem;
      background: #f1f5f9;
    }
    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #4338ca;
    }
    .multiple-section {
      margin-top: 50px;
      border-top: 1px solid #e2e8f0;
      padding-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Post a New Job</h2>
    <form id="singleJobForm">
      <label>Title</label>
      <input type="text" id="title" required />

      <label>Description</label>
      <textarea id="description" rows="4" required></textarea>

      <label>Location</label>
      <input type="text" id="location" required />

      <label>Company</label>
      <input type="text" id="company" required />

      <label>Experience (Years)</label>
      <input type="number" id="exp" required />

      <label>Salary (₹)</label>
      <input type="number" id="salary" required />

      <button type="submit" id="singleSubmit">Post Job</button>
    </form>

    <div class="multiple-section">
      <h2>Post Multiple Jobs (Bulk)</h2>
      <form id="multiJobForm">
        <label>Email</label>
        <input type="email" id="email" placeholder="Your Email (for identification)" required />

        <label>Paste JSON array of jobs</label>
        <textarea id="bulkJobs" rows="6" placeholder='[
  {"title":"Backend Developer", "description":"Node + Spring", "location":"Remote", "company":"TechX", "exp":2, "salary":60000},
  {"title":"QA Tester", "description":"Manual + Selenium", "location":"Hyderabad", "company":"TestCorp", "exp":1, "salary":40000}
]'></textarea>

        <button type="submit" id="multiSubmit">Post Multiple Jobs</button>
      </form>
    </div>
  </div>

  <script>
    const singleForm = document.getElementById("singleJobForm");
    const multiForm = document.getElementById("multiJobForm");
    const singleBtn = document.getElementById("singleSubmit");
    const multiBtn = document.getElementById("multiSubmit");

    singleForm.addEventListener("submit", e => {
      e.preventDefault();
      singleBtn.disabled = true;
      singleBtn.textContent = "Posting...";

      const data = {
        title: title.value,
        description: description.value,
        location: location.value,
        company: company.value,
        exp: Number(exp.value),
        salary: Number(salary.value)
      };

      fetch("/api/jobs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify(data)
      })
      .then(res => {
        if (!res.ok) throw new Error();
        alert("✅ Job posted successfully!");
        window.location.href = "/employer-dashboard.html";
      })
      .catch(() => {
        alert("❌ Failed to post job.");
        singleBtn.disabled = false;
        singleBtn.textContent = "Post Job";
      });
    });

    multiForm.addEventListener("submit", e => {
      e.preventDefault();
      multiBtn.disabled = true;
      multiBtn.textContent = "Posting...";

      let jobs;
      try {
        jobs = JSON.parse(document.getElementById("bulkJobs").value);
        if (!Array.isArray(jobs)) throw new Error();
      } catch {
        alert("Invalid JSON format");
        multiBtn.disabled = false;
        multiBtn.textContent = "Post Multiple Jobs";
        return;
      }

      const email = document.getElementById("email").value;

      fetch(`/api/jobs/multiple?email=${encodeURIComponent(email)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify(jobs)
      })
      .then(res => {
        if (!res.ok) throw new Error();
        alert("✅ Bulk jobs posted successfully!");
        window.location.href = "/my-jobs.html";
      })
      .catch(() => {
        alert("❌ Failed to post jobs.");
        multiBtn.disabled = false;
        multiBtn.textContent = "Post Multiple Jobs";
      });
    });
  </script>
</body>
</html>
