<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employer Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #0f172a;
      min-height: 100vh;
    }
    header {
      background: #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    header h1 {
      margin: 0;
      font-size: 1.8rem;
      color: #4f46e5;
    }
    .nav {
      display: flex;
      gap: 20px;
    }
    .nav a {
      text-decoration: none;
      color: #334155;
      font-weight: 600;
    }
    .nav a:hover {
      color: #6366f1;
    }
    .logout-btn {
      background: linear-gradient(135deg, #ef4444, #f87171);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .dashboard {
      max-width: 1100px;
      margin: 50px auto;
      padding: 40px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.07);
      text-align: center;
    }
    .dashboard h2 {
      margin-bottom: 10px;
      color: #1e293b;
    }
    .dashboard p {
      margin-bottom: 30px;
      color: #475569;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }
    .card {
      background: #fff;
      padding: 30px 20px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    .card a {
      text-decoration: none;
      color: #4f46e5;
      font-weight: 600;
      font-size: 1rem;
      display: block;
      margin-top: 10px;
    }
    .card span {
      display: block;
      font-size: 2.2rem;
      color: #6366f1;
    }
  </style>
</head>
<body>
  <header>
    <h1>Job Portal</h1>
    <div class="nav">
      <a href="/jobs.html">My Jobs</a>
      <a href="/post-job.html">Post Job</a>
      <a href="/view-applicants.html">Applicants</a>
      <a href="/employer-profile.html">Profile</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="dashboard">
    <h2 id="welcomeHeading">Welcome, Employer!</h2>
    <p>Use your dashboard to post jobs, review applicants, and manage hiring.</p>
    <div class="card-grid">
      <div class="card">
        <span>📝</span>
        <a href="/post-job.html">Post a New Job</a>
      </div>
      <div class="card">
        <span>📋</span>
        <a href="/my-jobs.html">Manage Posted Jobs</a>
      </div>
      <div class="card">
        <span>👥</span>
        <a href="/view-applicants.html">View Applicants</a>
      </div>
      <div class="card">
        <span>👤</span>
        <a href="/employer-profile.html">Edit Profile</a>
      </div>
    </div>
  </div>

  <script>
    function logout() {
      fetch("/logout", { method: "POST" })
        .then(() => window.location.href = "/login.html");
    }

    fetch('/users/profile', { credentials: 'include' })
      .then(res => res.ok ? res.json() : null)
      .then(user => {
        if (user?.fullName) {
          document.getElementById("welcomeHeading").textContent = `Welcome, ${user.fullName}!`;
        }
      })
      .catch(() => {
        document.getElementById("welcomeHeading").textContent = "Welcome, Employer!";
      });
  </script>
</body>
</html>
