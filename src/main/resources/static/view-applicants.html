<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Applications</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 0;
    }
    header {
      background: #4f46e5;
      color: #fff;
      padding: 20px 40px;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .container {
      max-width: 1100px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.07);
    }
    h2 {
      color: #1e293b;
      margin-bottom: 20px;
    }
    .application {
      border-bottom: 1px solid #e2e8f0;
      padding: 20px 0;
    }
    .application:last-child {
      border-bottom: none;
    }
    .applicant-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: #334155;
    }
    .applicant-details {
      font-size: 0.95rem;
      color: #475569;
      margin: 6px 0;
    }
    .job-info {
      font-size: 0.95rem;
      color: #64748b;
    }
    .status {
      font-weight: bold;
      color: #4f46e5;
      margin-top: 10px;
    }
    .resume-link {
      display: inline-block;
      margin-top: 10px;
      background: #e0e7ff;
      color: #1e40af;
      padding: 6px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>Applications Received</header>
  <div class="container">
    <h2>Your Posted Job Applications</h2>
    <div id="applicationsContainer">Loading applications...</div>
  </div>

  <script>
    fetch('/api/applications/employer', { credentials: 'include' })
      .then(res => res.json())
      .then(apps => {
        const container = document.getElementById('applicationsContainer');
        if (!apps.length) {
          container.innerHTML = '<p>No applications received yet.</p>';
          return;
        }

        container.innerHTML = apps.map(app => `
          <div class="application">
            <div class="applicant-name">${app.applicant.fullName} (${app.applicant.email})</div>
            <div class="applicant-details">
              Phone: ${app.applicant.phone}<br/>
              Education: ${app.applicant.education}
            </div>
            <div class="job-info">
              Applied for: <strong>${app.job.title}</strong> at <strong>${app.job.company}</strong><br/>
              Location: ${app.job.location} | Experience: ${app.job.exp} years
            </div>
            <div class="status">Status: ${app.status}</div>
            <a class="resume-link" href="${app.resumeUrl}" target="_blank">View Resume</a>
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('applicationsContainer').innerHTML = '<p>Failed to load applications.</p>';
      });
  </script>
</body>
</html>
