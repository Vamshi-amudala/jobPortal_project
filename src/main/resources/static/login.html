<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Job Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      color: #fff;
    }

    header {
      position: fixed; top: 0; width: 100%;
      background: rgba(0, 0, 0, 0.8);
      padding: 16px 40px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1000;
    }
    .logo {
      font-size: 1.8rem; font-weight: 600;
      color: #00b4d8;
      cursor: pointer;
    }
    nav {
      display: flex; gap: 24px;
    }
    nav a {
      color: #ccc; text-decoration: none;
      font-weight: 500; transition: 0.3s;
    }
    nav a:hover {
      color: #00b4d8;
    }
    .btn-login-header, .btn-register-header {
      padding: 6px 14px;
      font-weight: 600;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      font-size: 0.95rem;
    }
    .btn-login-header {
      background: transparent;
      border: 2px solid #00b4d8;
      color: #00b4d8;
    }
    .btn-login-header:hover {
      background-color: #00b4d8;
      color: #fff;
    }
    .btn-register-header {
      background-color: #0077b6;
      color: #fff;
      margin-left: 12px;
    }
    .btn-register-header:hover {
      background-color: #023e8a;
    }

    main {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 80px;
      background: rgba(0, 0, 0, 0.5);
    }

    .form-container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    .form-container h2 {
      color: #ffffff;
      margin-bottom: 24px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #00b4d8;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      background: linear-gradient(to right, #00b4d8, #0077b6);
      color: #fff;
      margin-top: 16px;
      transition: background 0.3s ease;
      cursor: pointer;
    }

    .btn-submit:hover {
      background: linear-gradient(to right, #0096c7, #023e8a);
    }

    .error-message {
      color: #ff6b6b;
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 12px;
    }

    a {
      color: #00b4d8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .bottom-links {
      margin-top: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="location.href='index.html'">JobPortal</div>
  <nav>
    <a href="index.html#home">Home</a>
    <a href="index.html#about">About</a>
    <a href="index.html#services">Services</a>
    <a href="index.html#how">How It Works</a>
    <a href="index.html#footer">Contact</a>
  </nav>
  <div>
    <button class="btn-login-header" onclick="location.href='login.html'">Login</button>
    <button class="btn-register-header" onclick="location.href='register.html'">Register</button>
  </div>
</header>

<main>
  <div class="form-container">
    <h2>Login to Your Account</h2>
    <form id="loginForm">
      <input type="email" id="email" name="email" placeholder="Email" required />

      <div class="password-wrapper">
        <input type="password" id="password" name="password" placeholder="Password" required />
        <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
      </div>

      <button class="btn-submit" type="submit">Login</button>

      <div id="loginMessage" class="error-message"></div>

      <div class="bottom-links">
        <div style="text-align:right;">
          <a href="forgot-password.html">Forgot Password?</a>
        </div>
        <div style="text-align:center; margin-top: 8px;">
          Don't have an account? <a href="register.html">Register here</a>
        </div>
      </div>
    </form>
  </div>
</main>
<script>
  const togglePassword = document.getElementById('togglePassword');
  const password = document.getElementById('password');

  togglePassword.addEventListener('click', () => {
    const type = password.type === 'password' ? 'text' : 'password';
    password.type = type;
    togglePassword.classList.toggle('fa-eye-slash');
  });

  document.getElementById("loginForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const formData = new FormData(this);
    const payload = {
      email: formData.get("email"),
      password: formData.get("password")
    };

    try {
      const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        // Fetch user role after successful login
        const res = await fetch("/api/dashboard-data", {
          cache: "no-store",
          credentials: "include"
        });

        if (!res.ok) throw new Error("Failed to fetch user role");

        const data = await res.json();
        const role = data.role || data.roles?.[0]; // Handle single or array role

        if (role.includes("ROLE_EMPLOYER")) {
          window.location.href = "/employer.html";
        } else if (role.includes("ROLE_JOB_SEEKER")) {
          window.location.href = "/job-seeker.html";
        } else {
          alert("Unknown role: " + role);
        }
      } else {
        document.getElementById("loginMessage").textContent = "Invalid login credentials.";
      }
    } catch (err) {
      console.error("Login error:", err);
      document.getElementById("loginMessage").textContent = "Server error. Please try again later.";
    }
  });
</script>


</body>
</html>
